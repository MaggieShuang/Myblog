<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马双的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .post {
            background: white;
            padding: 35px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .post:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .post-title {
            font-size: 1.8em;
            color: #2d3436;
            margin-bottom: 15px;
        }
        
        .post-meta {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .post-meta i {
            color: #667eea;
        }
        
        .post-content {
            color: #555;
            line-height: 1.9;
            font-size: 1.05em;
        }
        
        .post-content h2 {
            margin: 25px 0 15px 0;
            color: #2d3436;
        }
        
        .post-content p {
            margin-bottom: 15px;
        }
        
        .tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin: 5px 5px 5px 0;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }
            .post {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 马双的博客</h1>
            <p class="subtitle">记录思考与生活 | 记录每一天的美好</p>
        </div>
        
        <div class="post">
            <h2 class="post-title">我的第一篇博客</h2>
            <div class="post-meta">
                <i class="far fa-calendar-alt"></i>
                <span>2026年3月28日</span>
            </div>
            <div class="post-content">
                <p>欢迎来到我的博客！✨</p>
                
                <h2>为什么开这个博客？</h2>
                <p>想要一个地方记录自己的想法和思考，无论是关于工作、生活还是一些随意的感悟。</p>
                
                <h2>这是什么样的地方？</h2>
                <p>一个简单的个人空间，用最简单的方式记录内容——就是写文字。</p>
                
                <h2>未来会写什么？</h2>
                <p>还没有特别规划，可能会写：</p>
                <ul>
                    <li>📝 日常的思考和感悟</li>
                    <li>📚 学习到的新知识</li>
                    <li>🌟 生活中的有趣发现</li>
                </ul>
                
                <p>慢慢来，一步步写下去就好。</p>
            </div>
            <div style="margin-top: 20px;">
                <span class="tag">#生活</span>
                <span class="tag">#开始</span>
            </div>
        </div>
    </div>
</body>
</html>
